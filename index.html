<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lomami Ventures</title>
  <style>
    :root{
      --ink:#1f3a36;
      --soft:#5f7f79;
      --bg:#eef6f4;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg);
      color:var(--ink);
    }
    .hero{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:flex-end;
      background-image:
        linear-gradient(
          to top,
          rgba(238,246,244,.92) 0%,
          rgba(238,246,244,.55) 35%,
          rgba(238,246,244,.15) 60%,
          rgba(238,246,244,0) 80%
        ),
        url("/lomami-river.jpg");
      background-size:cover;
      background-position:center;
    }
    .content{
      padding:48px 28px 28px;
      max-width:760px;
    }
    h1{
      margin:0 0 10px;
      font-size:clamp(28px,5vw,44px);
      font-weight:600;
      letter-spacing:.2px;
    }
    p{
      margin:0;
      font-size:clamp(15px,2.4vw,18px);
      color:var(--soft);
      line-height:1.6;
    }
    .contact{
      margin-top:18px;
      font-size:14px;
      letter-spacing:.3px;
    }
    .contact a{
      text-decoration:none;
      color:var(--ink);
      border-bottom:1px solid rgba(31,58,54,.25);
    }
    .contact a:hover{border-bottom-color:rgba(31,58,54,.6)}
    .links{
      margin-top:14px;
      font-size:13px;
      color:var(--soft);
    }
    .links a{
      text-decoration:none;
      color:var(--soft);
      border-bottom:1px solid rgba(95,127,121,.25);
    }
    .links a:hover{border-bottom-color:rgba(95,127,121,.6)}
  </style>
</head>

<body>
  <main class="hero">
    <div class="content">
      <h1>Lomami Ventures</h1>
      <p>Calm. Connection. Human nature.</p>

      <div class="contact">
        <a href="mailto:accounts@lomamiventures.com">accounts@lomamiventures.com</a>
      </div>

      <div class="links">
        <a href="/privacy.html">Privacy Policy</a> ·
        <a href="/terms.html">Terms</a>
      </div>
    </div>
  </main>
</body>
</html>
